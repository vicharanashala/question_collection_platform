services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: question_platform_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - DB_HOST=host.docker.internal
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: question_platform_web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: question_platform_redis
    restart: unless-stopped
    ports:
      - '${REDIS_BIND:-127.0.0.1}:6379:6379'
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:***
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:***', 'ping']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_data: